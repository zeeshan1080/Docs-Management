<div class="min-h-screen">
  <app-portal-header></app-portal-header>

  <div class="relative z-0 mx-auto max-w-7xl px-4 py-8">
    <div
      class="overflow-hidden rounded-3xl border border-slate-100 bg-white shadow-portal-float motion-safe:animate-fade-in"
    >
      <div class="border-b border-slate-100/90 bg-gradient-to-r from-slate-50/80 to-portal-50/30 px-6 py-4">
        <h2 class="text-base font-extrabold text-slate-900">Pending registrations</h2>
        <p class="mt-0.5 text-xs text-slate-500">Review new employee sign-ups and assign their role and location.</p>
      </div>
      <table class="min-w-full divide-y divide-slate-200/90 text-sm">
        <thead
          class="bg-gradient-to-r from-slate-50 to-portal-50/50 text-left text-xs font-bold uppercase tracking-wide text-slate-500"
        >
          <tr>
            <th class="px-4 py-3">Employee</th>
            <th class="px-4 py-3">Role</th>
            <th class="px-4 py-3">Location</th>
            <th class="px-4 py-3">Assign</th>
            <th class="px-4 py-3 text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          <tr
            *ngFor="let r of items"
            class="align-top transition-colors hover:bg-portal-50/40"
          >
            <td class="px-4 py-3">
              <div class="font-medium text-slate-900">{{ r.userEmail }}</div>
              <div class="text-xs text-slate-500">#{{ r.userId | slice:0:8 }}…</div>
            </td>
            <td class="px-4 py-3 text-slate-700">{{ r.requestedRoleName }}</td>
            <td class="px-4 py-3 text-slate-700">{{ r.requestedLocationName }}</td>
            <td class="px-4 py-3">
              <div class="space-y-2">
                <select
                  #roleSel
                  class="w-full rounded-xl border border-slate-200 bg-white/90 px-2 py-2 text-xs font-medium shadow-sm transition focus:border-portal-400 focus:outline-none focus:ring-2 focus:ring-portal-100"
                  [value]="r.requestedRoleId"
                >
                  <option *ngFor="let o of roles" [value]="o.id">{{ o.name }}</option>
                </select>
                <select
                  #locSel
                  class="w-full rounded-xl border border-slate-200 bg-white/90 px-2 py-2 text-xs font-medium shadow-sm transition focus:border-portal-400 focus:outline-none focus:ring-2 focus:ring-portal-100"
                  [value]="r.requestedLocationId"
                >
                  <option *ngFor="let l of locations" [value]="l.id">{{ l.name }}</option>
                </select>
              </div>
            </td>
            <td class="px-4 py-3 text-right space-y-2">
              <button
                type="button"
                [disabled]="busy[r.id]"
                (click)="approve(r, roleSel.value, +locSel.value)"
                class="block w-full rounded-xl bg-gradient-to-br from-emerald-600 to-teal-600 px-3 py-2.5 text-xs font-bold text-white shadow-md shadow-emerald-600/25 transition hover:from-emerald-500 hover:to-teal-500 hover:shadow-lg active:scale-[0.98] disabled:opacity-50"
              >
                Approve
              </button>
              <button
                type="button"
                [disabled]="busy[r.id]"
                (click)="reject(r)"
                class="block w-full rounded-xl border border-red-200/90 bg-white/80 px-3 py-2.5 text-xs font-semibold text-red-700 shadow-sm transition hover:bg-red-50 active:scale-[0.98] disabled:opacity-50"
              >
                Reject
              </button>
            </td>
          </tr>
          <tr *ngIf="!items.length">
            <td colspan="5" class="px-4 py-10 text-center text-slate-500">No pending requests.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
