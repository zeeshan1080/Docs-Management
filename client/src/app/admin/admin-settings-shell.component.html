<div class="min-h-screen">
  <app-portal-header></app-portal-header>
  <nav
    class="mx-auto flex max-w-7xl flex-wrap gap-1 border-b border-slate-100 bg-portal-50/50 px-4 py-2 text-sm"
    aria-label="Settings sections"
  >
    <a
      routerLink="/admin/users"
      routerLinkActive="bg-white text-portal-800 shadow-sm ring-1 ring-portal-100"
      [routerLinkActiveOptions]="{ exact: true }"
      class="rounded-xl px-3 py-2 font-semibold text-slate-600 transition hover:bg-white/80 hover:text-portal-800"
    >
      Users
    </a>
    <a
      routerLink="/admin/settings/locations"
      routerLinkActive="bg-white text-portal-800 shadow-sm ring-1 ring-portal-100"
      [routerLinkActiveOptions]="{ exact: false }"
      class="rounded-xl px-3 py-2 font-semibold text-slate-600 transition hover:bg-white/80 hover:text-portal-800"
    >
      Locations
    </a>
    <a
      routerLink="/admin/settings/roles"
      routerLinkActive="bg-white text-portal-800 shadow-sm ring-1 ring-portal-100"
      class="rounded-xl px-3 py-2 font-semibold text-slate-600 transition hover:bg-white/80 hover:text-portal-800"
    >
      Roles
    </a>
  </nav>
  <div class="relative z-0 mx-auto max-w-7xl px-4 py-8">
    <router-outlet></router-outlet>
  </div>
</div>
