<div class="auth-shell">
  <div class="auth-shell-bg" aria-hidden="true"></div>
  <div class="auth-shell-orb" aria-hidden="true"></div>
  <div class="auth-shell-orb-2" aria-hidden="true"></div>

  <div class="auth-card-narrow">
    <div class="auth-brand-logo-wrap">
      <div class="auth-brand-logo-inner">
        <img
          src="assets/logo.png"
          width="220"
          height="128"
          alt="josephanthony"
          class="auth-brand-logo"
        />
      </div>
    </div>
    <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">Choose a new password</h1>
    <p class="mt-2 text-sm text-slate-600">
      Use at least 8 characters with uppercase, lowercase, a number, and a special character.
    </p>

    <div *ngIf="done" class="mt-8 space-y-4">
      <p class="rounded-xl border border-emerald-100 bg-emerald-50 px-3 py-2 text-sm text-emerald-800">
        Your password was updated. You can sign in now.
      </p>
      <button type="button" (click)="goLogin()" class="btn-primary w-full py-3">Sign in</button>
    </div>

    <form *ngIf="!done" class="mt-8 space-y-5" (ngSubmit)="submit()">
      <div>
        <label class="block text-sm font-semibold text-slate-700">
          Email <span class="text-red-600" aria-hidden="true">*</span>
        </label>
        <p class="field-input border-slate-100 bg-slate-50/80 text-slate-800">{{ email || '—' }}</p>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700">
          New password <span class="text-red-600" aria-hidden="true">*</span>
        </label>
        <input
          class="field-input"
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          minlength="8"
          autocomplete="new-password"
          title="Strong password required: upper, lower, digit, special"
          [disabled]="!email || !token"
        />
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700">
          Confirm password <span class="text-red-600" aria-hidden="true">*</span>
        </label>
        <input
          class="field-input"
          type="password"
          name="confirm"
          [(ngModel)]="confirm"
          required
          minlength="8"
          autocomplete="new-password"
          title="Must match new password"
          [disabled]="!email || !token"
        />
      </div>
      <p *ngIf="error" class="rounded-xl border border-red-100 bg-red-50 px-3 py-2 text-sm text-red-700">{{ error }}</p>
      <button type="submit" [disabled]="loading || !email || !token" class="btn-primary w-full py-3">
        {{ loading ? 'Saving…' : 'Update password' }}
      </button>
    </form>

    <p class="mt-8 text-center text-sm text-slate-600">
      <a routerLink="/forgot-password" class="font-semibold text-portal-600 transition hover:text-portal-800"
        >Request a new link</a>
      <span class="mx-2 text-slate-300">·</span>
      <a routerLink="/login" class="font-semibold text-portal-600 transition hover:text-portal-800">Sign in</a>
    </p>
  </div>
</div>
