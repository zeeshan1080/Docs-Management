<ul class="space-y-0.5" [style.padding-left.px]="depth ? 12 : 0">
  <li *ngFor="let n of nodes" class="relative" data-folder-row>
    <button
      type="button"
      (click)="pick(n)"
      class="group flex w-full min-w-0 items-center gap-2 rounded-lg px-2 py-2 text-left text-sm transition-all duration-200 ease-out active:scale-[0.99] motion-safe:group-hover:translate-x-0.5"
      [ngClass]="
        selectedId === n.id
          ? 'bg-gradient-to-r from-portal-50 to-sky-50 font-semibold text-portal-900 shadow-sm ring-1 ring-portal-100/80'
          : 'text-slate-700 hover:bg-white/80 hover:shadow-sm motion-safe:hover:shadow-md'
      "
    >
      <span
        class="inline-flex h-5 w-5 shrink-0 items-center justify-center text-portal-600 transition-transform duration-200 motion-safe:group-hover:scale-110 motion-safe:group-hover:-rotate-3"
        [class.text-portal-700]="selectedId === n.id"
        aria-hidden="true"
      >
        <lucide-icon name="folder" [size]="20" [strokeWidth]="1.5"></lucide-icon>
      </span>
      <span class="min-w-0 truncate">{{ n.name }}</span>
    </button>
    <app-folder-tree
      *ngIf="n.children?.length"
      [nodes]="n.children"
      [selectedId]="selectedId"
      [depth]="depth + 1"
      (selectFolder)="selectFolder.emit($event)"
    ></app-folder-tree>
  </li>
</ul>
